<!DOCTYPE html>
<html lang="zh-CN">

<head>

<meta charset="UTF-8">
<title>AI纯文字海报提示词生成器 V3</title>

<style>

body{
font-family:"Microsoft YaHei";
background:linear-gradient(135deg,#020617,#1e293b);
color:white;
padding:40px;
}

.container{
max-width:1200px;
margin:auto;
}

h1{
text-align:center;
margin-bottom:30px;
}

.box{
background:#0f172a;
padding:25px;
border-radius:10px;
margin-bottom:30px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border-radius:6px;
border:none;
font-size:16px;
}

button{
width:100%;
padding:14px;
background:#3b82f6;
border:none;
color:white;
font-size:18px;
border-radius:8px;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#2563eb;
}

.copybtn{
background:#10b981;
}

.copybtn:hover{
background:#059669;
}

.result{
background:#020617;
padding:30px;
border-radius:10px;
white-space:pre-wrap;
line-height:1.7;
font-size:15px;
}

</style>

</head>

<body>

<div class="container">

<h1>AI纯文字海报提示词生成器 V3</h1>

<div class="box">

海报主题
<input id="title">

副标题
<input id="subtitle">

海报类型
<input id="type">

<button onclick="generate()">生成20组提示词</button>

<button class="copybtn" onclick="copyText()">一键复制提示词</button>

</div>

<div id="output" class="result"></div>

</div>

<script>

function rand(arr){
return arr[Math.floor(Math.random()*arr.length)]
}

let fonts=[
"现代黑体与宋体混搭",
"几何无衬线字体组合",
"粗黑体与极细黑体对比",
"未来感字体系统",
"工业风字体结构",
"复古宋体与现代字体结合",
"书法字体与极简黑体组合",
"实验性字体组合",
"科技风无衬线字体",
"文化风字体组合"
]

let layouts=[
"12列网格系统排版",
"非对称构图结构",
"中轴对称构图",
"九宫格构图系统",
"黄金比例构图",
"对角线视觉动线构图",
"模块化排版结构",
"视觉矩阵结构",
"极简留白构图",
"层级递进排版"
]

let colors=[
"黑白单色体系",
"黑红对比体系",
"深蓝白色体系",
"灰度层级体系",
"米白墨色体系",
"黑金高级体系"
]

let visuals=[
"文字巨大结构形成视觉中心",
"文字矩阵形成空间结构",
"文字纵横排列形成视觉路径",
"文字围合形成图形结构",
"负形空间强化视觉节奏",
"文字叠加形成设计张力"
]

let aiOptimize=[
"强化标题视觉冲击力，突出字体结构设计",
"优化文字层级系统，增强阅读节奏",
"加强版面留白，突出信息焦点",
"优化文字排列路径，形成视觉引导",
"强化字体对比关系，增强设计张力",
"增强信息层级清晰度"
]

function generate(){

let title=document.getElementById("title").value
let subtitle=document.getElementById("subtitle").value
let type=document.getElementById("type").value

let output=[]

for(let i=1;i<=20;i++){

let text=`

${i}、

主标题：${title}
副标题：${subtitle}
海报类型：${type}

辅助文字：
时间：2026设计论坛
地点：城市文化艺术中心
主办方：未来设计研究院
说明：围绕字体设计与版面构成展开
联系方式：design@studio.cn

纯文字视觉元素：
${rand(visuals)}，通过文字结构构建视觉图形，利用正形与负形关系形成空间层次。

文字设计手法：
${rand(fonts)}，
建立清晰字号层级，
字重节奏变化明显，
文字横排竖排结合，
字距行距形成节奏，
文字可进行拆解与重构。

版面构成：
${rand(layouts)}，
通过网格系统组织信息，
留白强化视觉焦点，
形成清晰视觉动线。

色彩方案：
${rand(colors)}，
背景简洁，
文字颜色突出层级关系。

AI优化建议：
${rand(aiOptimize)}。

风格：
纯文字排版设计、版面构成严谨、字体应用精准、信息层级清晰、视觉引导明确。

`

output.push(text)

}

document.getElementById("output").innerText=output.join("\n\n")

}

function copyText(){

let text=document.getElementById("output").innerText

navigator.clipboard.writeText(text)

alert("提示词已复制")

}

</script>

</body>

</html>
