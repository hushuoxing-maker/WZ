<!DOCTYPE html>
<html lang="zh-CN">

<head>
<meta charset="UTF-8">
<title>古月ai智能体-AI纯文字海报生成器</title>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:"Microsoft YaHei",sans-serif;
}

body{

background:
radial-gradient(circle at 20% 20%,#1e293b 0%,transparent 40%),
radial-gradient(circle at 80% 80%,#312e81 0%,transparent 40%),
linear-gradient(160deg,#020617,#020617,#020617);

min-height:100vh;
color:#e2e8f0;
padding:60px;
}

.container{
max-width:1200px;
margin:auto;
}

h1{
text-align:center;
font-size:34px;
margin-bottom:40px;
font-weight:600;
letter-spacing:1px;
}

.card{

background:rgba(15,23,42,0.75);
backdrop-filter:blur(20px);

padding:30px;
border-radius:16px;

box-shadow:
0 10px 30px rgba(0,0,0,0.4),
inset 0 1px 0 rgba(255,255,255,0.05);

margin-bottom:30px;

}

label{
font-size:14px;
opacity:0.7;
}

input{

width:100%;
padding:14px;
margin-top:8px;
margin-bottom:18px;

background:#020617;
border:1px solid #1e293b;
border-radius:8px;

color:white;
font-size:16px;

}

input:focus{
outline:none;
border-color:#6366f1;
}

button{

width:100%;
padding:14px;
border:none;
border-radius:10px;

font-size:16px;
cursor:pointer;

background:linear-gradient(135deg,#6366f1,#8b5cf6);

color:white;
margin-top:8px;

}

button:hover{
opacity:0.9;
}

.copy{

background:linear-gradient(135deg,#10b981,#059669);
}

.result{

margin-top:20px;

background:#020617;
border:1px solid #1e293b;

padding:30px;

border-radius:14px;

white-space:pre-wrap;
line-height:1.7;

font-size:14px;

max-height:600px;
overflow:auto;

}

</style>

</head>

<body>

<div class="container">

<h1>古月ai智能体-AI纯文字海报生成器</h1>

<div class="card">

<label>海报主题</label>
<input id="title" placeholder="例如：设计改变世界">

<label>海报副标题</label>
<input id="subtitle" placeholder="例如：字体是最强视觉语言">

<button onclick="generate()">生成20组提示词</button>

<button class="copy" onclick="copyText()">一键复制提示词</button>

</div>

<div id="output" class="result"></div>

</div>

<script>

function rand(arr){
return arr[Math.floor(Math.random()*arr.length)]
}

let fonts=[
"现代黑体与宋体混搭",
"粗黑体与极细黑体对比",
"几何无衬线字体组合",
"未来感字体系统",
"工业风字体结构",
"复古宋体与现代字体结合",
"书法字体与极简黑体组合",
"实验性字体组合",
"科技风无衬线字体",
"文化风字体组合"
]

let layouts=[
"12列网格系统排版",
"非对称构图结构",
"中轴对称构图",
"九宫格构图系统",
"黄金比例构图",
"对角线视觉动线构图",
"模块化排版结构",
"视觉矩阵结构",
"极简留白构图",
"层级递进排版"
]

let colors=[
"黑白单色体系",
"黑红对比体系",
"深蓝白色体系",
"灰度层级体系",
"米白墨色体系",
"黑金高级体系"
]

let visuals=[
"文字巨大结构形成视觉中心",
"文字矩阵形成空间结构",
"文字纵横排列形成视觉路径",
"文字围合形成图形结构",
"负形空间强化视觉节奏",
"文字叠加形成设计张力"
]

let aiOptimize=[
"强化标题视觉冲击力",
"优化文字层级系统",
"加强版面留白",
"优化视觉阅读路径",
"强化字体对比关系",
"增强信息层级清晰度"
]

function generate(){

let title=document.getElementById("title").value
let subtitle=document.getElementById("subtitle").value

let result=[]

for(let i=1;i<=20;i++){

let text=

`${i}、

主标题：${title}
副标题：${subtitle}

辅助文字：
时间：2026设计论坛
地点：城市文化艺术中心
主办方：未来设计研究院
联系方式：design@studio.cn

纯文字视觉元素：
${rand(visuals)}，通过文字结构构建视觉图形，利用正形与负形关系形成空间层次。

文字设计手法：
${rand(fonts)}，
字号层级清晰，
字重节奏变化明显，
文字横排竖排结合，
字距行距形成视觉节奏。

版面构成：
${rand(layouts)}，
通过网格系统组织信息，
留白强化视觉焦点。

色彩方案：
${rand(colors)}。

AI优化建议：
${rand(aiOptimize)}。

风格：
纯文字排版设计、版面构成严谨、字体应用精准、信息层级清晰、视觉引导明确。
`

result.push(text)

}

document.getElementById("output").innerText=result.join("\n\n")

}

function copyText(){

let text=document.getElementById("output").innerText

navigator.clipboard.writeText(text)

alert("提示词已复制")

}

</script>

</body>
</html>
